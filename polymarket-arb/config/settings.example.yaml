runtime:
  poll_interval_seconds: 2
  log_level: INFO

strategy:
  min_edge_bps: 40          # 0.40%
  min_liquidity_usd: 200
  max_slippage_bps: 20
  fee_bps_per_leg: 15
  signal_cooldown_sec: 30   # evita señales repetidas por mercado/acción

risk:
  max_notional_per_trade_usd: 20
  max_total_exposure_usd: 200
  max_daily_loss_usd: 30
  kill_switch: false

paper:
  starting_balance_usd: 1000

execution:
  mode: paper               # paper | live
  dry_run: true

market_data:
  ws_url: "wss://ws-subscriptions-clob.polymarket.com/ws/market"
  # Rellena con token IDs reales (asset IDs YES/NO)
  asset_ids: []
  auto_discover_enabled: true
  auto_discover_limit: 500
  auto_discover_refresh_sec: 120
  # Pares YES/NO del mismo mercado para arbitraje de paridad
  market_pairs: []

# Placeholder para credenciales (no subir secrets)
alerts:
  telegram_enabled: false
  telegram_bot_token: ""
  telegram_chat_id: ""
  min_seconds_between_alerts: 60
  notify_skips: false
  heartbeat_seconds: 0

secrets:
  polymarket_private_key: ""
  polymarket_api_key: ""
