services:
  geoffrey:
    build:
      context: .
      dockerfile: Dockerfile.picoclaw
    container_name: geoffrey-picoclaw
    restart: unless-stopped
    ports:
      - "18800:18800"
      - "18790:18790"
    environment:
      TZ: Europe/Madrid
      PICOCLAW_GATEWAY_HOST: 0.0.0.0
    volumes:
      - ./picoclaw-data:/root/.picoclaw
